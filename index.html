<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="title">vtrain — Jack Daniels Training Plans</title>
  <style>
    :root {
      --bg: #1a1a1a;
      --fg: #e8e8e8;
      --muted: #888;
      --accent: #f0c674;
      --quality: #cc6666;
      --rest: #81a2be;
      --easy: #b5bd68;
      --card: #252525;
      --border: #333;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      margin: 0;
      padding: 1rem;
      line-height: 1.5;
    }
    main {
      max-width: 820px;
      margin: 0 auto;
    }
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
    }
    h1 {
      color: var(--accent);
      margin: 0 0 0.25rem 0;
    }
    .subtitle {
      color: var(--muted);
      margin-top: 0;
      font-size: 0.9rem;
    }
    .subtitle a { color: var(--rest); }
    .lang-toggle {
      display: flex;
      gap: 0.25rem;
      flex-shrink: 0;
    }
    .lang-toggle button {
      padding: 0.3rem 0.6rem;
      font-size: 0.75rem;
      font-family: inherit;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 0.05em;
    }
    .lang-toggle button.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
      font-weight: 600;
    }
    form {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem;
      margin: 1rem 0;
      display: grid;
      gap: 0.75rem;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }
    label {
      display: flex;
      flex-direction: column;
      font-size: 0.85rem;
      color: var(--muted);
    }
    input, select, button {
      font-family: inherit;
      font-size: 1rem;
      padding: 0.5rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #1f1f1f;
      color: var(--fg);
      margin-top: 0.25rem;
    }
    form > button[type="submit"] {
      background: var(--accent);
      color: #1a1a1a;
      font-weight: 600;
      cursor: pointer;
      grid-column: 1 / -1;
      margin-top: 0.5rem;
    }
    form > button[type="submit"]:hover { filter: brightness(1.1); }
    .error {
      color: var(--quality);
      background: rgba(204, 102, 102, 0.1);
      border: 1px solid var(--quality);
      padding: 0.75rem;
      border-radius: 4px;
      margin: 1rem 0;
    }
    .week {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 4px;
      padding: 0.75rem 1rem;
      margin: 0.75rem 0;
    }
    .week h3 {
      color: var(--accent);
      margin: 0 0 0.5rem 0;
      font-size: 1rem;
    }
    .week ul {
      list-style: none;
      padding: 0;
      margin: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.85rem;
    }
    .week li { padding: 0.15rem 0; }
    .week li.q { color: var(--quality); }
    .week li.rest { color: var(--rest); }
    .week .km {
      margin: 0.5rem 0 0 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .paces {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--easy);
      border-radius: 4px;
      padding: 0.75rem 1rem;
      margin: 1rem 0;
    }
    .paces h3 {
      color: var(--easy);
      margin: 0 0 0.5rem 0;
      font-size: 1rem;
    }
    .paces dl {
      margin: 0;
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 0.25rem 1rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.9rem;
    }
    .paces dt { color: var(--accent); }
    .paces dd { margin: 0; }
    footer {
      color: var(--muted);
      font-size: 0.8rem;
      text-align: center;
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--rest); }
  </style>
</head>
<body>
  <main>
    <div class="header-row">
      <div>
        <h1>vtrain</h1>
        <p class="subtitle" data-i18n="subtitle"></p>
      </div>
      <div class="lang-toggle" role="group" aria-label="Language">
        <button type="button" data-lang="en">EN</button>
        <button type="button" data-lang="es">ES</button>
      </div>
    </div>

    <form id="plan-form">
      <label>
        <span data-i18n="labelDistance"></span>
        <select id="distancia" required>
          <option value="42"></option>
          <option value="21" selected></option>
          <option value="10"></option>
          <option value="0"></option>
        </select>
      </label>
      <label>
        <span data-i18n="labelRaceDate"></span>
        <input type="date" id="fechaCarrera" required>
      </label>
      <label>
        <span data-i18n="labelTargetTime"></span>
        <input type="time" id="tiempoObjetivo" step="1" value="01:35:00" required>
      </label>
      <button type="submit" data-i18n="submit"></button>
    </form>

    <div id="output"></div>

    <footer>
      <a href="https://github.com/jandroav/vtrain" target="_blank" rel="noopener">github.com/jandroav/vtrain</a>
    </footer>
  </main>
  <script src="vtrain.js"></script>
</body>
</html>
