<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0a0a0b">
  <title data-i18n="title">vtrain — Jack Daniels Training Plans</title>
  <style>
    :root {
      --bg: #0a0a0b;
      --bg-elevated: #16161a;
      --bg-hover: #1d1d22;
      --bg-input: #0f0f12;
      --border: #27272a;
      --border-strong: #3f3f46;
      --fg: #fafafa;
      --fg-muted: #a1a1aa;
      --fg-dim: #71717a;
      --accent: #f97316;
      --accent-hover: #ea580c;
      --accent-soft: rgba(249, 115, 22, 0.12);
      --accent-fg: #1a0a00;
      --quality: #ef4444;
      --quality-soft: rgba(239, 68, 68, 0.14);
      --long: #3b82f6;
      --long-soft: rgba(59, 130, 246, 0.14);
      --race: #fbbf24;
      --race-soft: rgba(251, 191, 36, 0.14);
      --easy: #22c55e;
      --interval: #a855f7;
      --rest: #71717a;
      --radius-sm: 4px;
      --radius: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --font-mono: ui-monospace, "SF Mono", Menlo, Monaco, "Cascadia Mono", "Roboto Mono", monospace;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { color-scheme: dark; -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      background-image: radial-gradient(ellipse at top, rgba(249, 115, 22, 0.06), transparent 60%);
      background-attachment: fixed;
      color: var(--fg);
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 920px;
      width: 100%;
      margin: 0 auto;
      padding: 0 1.25rem;
    }

    /* Header */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      padding: 1.25rem 1.25rem 0;
      max-width: 920px;
      width: 100%;
      margin: 0 auto;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--fg);
      text-decoration: none;
    }
    .brand-mark {
      width: 22px;
      height: 22px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .lang-toggle {
      display: inline-flex;
      gap: 2px;
      padding: 2px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .lang-toggle button {
      background: none;
      border: none;
      padding: 0.35rem 0.7rem;
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--fg-dim);
      cursor: pointer;
      border-radius: 5px;
      transition: color 0.15s, background 0.15s;
    }
    .lang-toggle button:hover { color: var(--fg-muted); }
    .lang-toggle button.active {
      background: var(--bg-hover);
      color: var(--fg);
    }
    .lang-toggle button:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }

    /* Hero */
    .intro {
      text-align: center;
      padding: 3rem 0 2rem;
    }
    .hero-title {
      font-size: clamp(1.875rem, 4.5vw, 2.75rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin: 0 0 0.85rem 0;
    }
    .hero-subtitle {
      color: var(--fg-muted);
      font-size: 1rem;
      max-width: 38rem;
      margin: 0 auto;
    }
    .hero-subtitle a {
      color: var(--accent);
      text-decoration: underline;
      text-decoration-color: rgba(249, 115, 22, 0.4);
      text-underline-offset: 2px;
    }
    .hero-subtitle a:hover { text-decoration-color: var(--accent); }

    /* Calculator form */
    .calculator {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin: 0 0 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.02) inset;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .field-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--fg-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .distance-options {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
    }
    .distance-card {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      padding: 1rem 0.5rem;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.05s;
      text-align: center;
      user-select: none;
    }
    .distance-card:hover {
      border-color: var(--border-strong);
      background: var(--bg-hover);
    }
    .distance-card:active { transform: scale(0.98); }
    .distance-card input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }
    .distance-card:has(input:focus-visible),
    .distance-card.is-focused {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .distance-card.is-selected {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--accent-fg);
    }
    .dist-num {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .dist-label {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--fg-muted);
    }
    .distance-card.is-selected .dist-label {
      color: var(--accent-fg);
      opacity: 0.85;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }
    .field input {
      width: 100%;
      padding: 0.7rem 0.8rem;
      font-family: inherit;
      font-size: 0.95rem;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--fg);
      transition: border-color 0.15s, box-shadow 0.15s;
      color-scheme: dark;
    }
    .field input:hover { border-color: var(--border-strong); }
    .field input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .primary-cta {
      width: 100%;
      padding: 0.85rem 1.25rem;
      background: var(--accent);
      color: var(--accent-fg);
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: -0.005em;
      cursor: pointer;
      transition: background 0.15s, transform 0.05s;
    }
    .primary-cta:hover { background: var(--accent-hover); }
    .primary-cta:active { transform: scale(0.99); }
    .primary-cta:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* Plan output */
    .plan-output {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      margin-bottom: 3rem;
    }
    .plan-output:empty { display: none; }

    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.35);
      color: #fca5a5;
      padding: 0.75rem 1rem;
      border-radius: var(--radius);
      font-size: 0.9rem;
    }

    /* VDOT hero */
    .vdot-hero {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 2rem;
      align-items: center;
    }
    .vdot-block {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding-right: 2rem;
      border-right: 1px solid var(--border);
      min-width: 8rem;
    }
    .vdot-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--accent);
      text-transform: uppercase;
    }
    .vdot-value {
      font-size: 4rem;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.04em;
      margin: 0.15rem 0 0.25rem;
      font-feature-settings: "tnum";
    }
    .vdot-meta {
      font-size: 0.72rem;
      color: var(--fg-dim);
      letter-spacing: 0.04em;
    }

    .paces-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.6rem;
    }
    .pace-card {
      padding: 0.65rem 0.8rem;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-left: 3px solid var(--fg-dim);
      border-radius: var(--radius);
      transition: border-color 0.15s, background 0.15s;
    }
    .pace-card:hover { background: var(--bg-hover); }
    .pace-card.pace-easy       { border-left-color: var(--easy); }
    .pace-card.pace-marathon   { border-left-color: var(--accent); }
    .pace-card.pace-threshold  { border-left-color: var(--quality); }
    .pace-card.pace-interval   { border-left-color: var(--interval); }
    .pace-card.pace-repetition { border-left-color: var(--long); }
    .pace-name {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--fg-muted);
    }
    .pace-value {
      font-family: var(--font-mono);
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin: 2px 0 4px;
      font-feature-settings: "tnum";
    }
    .pace-desc {
      font-size: 0.7rem;
      color: var(--fg-dim);
      line-height: 1.4;
    }

    /* Phase strip */
    .phase-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
    }
    .phase-segment {
      padding: 0.7rem 0.85rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-top: 3px solid var(--phase-color, var(--fg-dim));
      border-radius: var(--radius);
    }
    .phase-segment.phase-FI { --phase-color: #64748b; }
    .phase-segment.phase-EQ { --phase-color: #06b6d4; }
    .phase-segment.phase-TQ { --phase-color: var(--accent); }
    .phase-segment.phase-FQ { --phase-color: var(--quality); }
    .phase-segment-name {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .phase-segment-weeks {
      font-size: 0.72rem;
      color: var(--fg-muted);
      margin-top: 1px;
    }

    /* Mileage chart */
    .mileage-chart {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem 1.25rem 0.75rem;
    }
    .chart-title {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--fg-muted);
      margin: 0 0 0.5rem;
    }
    .mileage-chart svg {
      width: 100%;
      height: auto;
      display: block;
      max-height: 140px;
    }
    .bar-group rect {
      fill: var(--fg-dim);
      transition: fill 0.15s, opacity 0.15s;
      opacity: 0.85;
    }
    .bar-group:hover rect { opacity: 1; }
    .bar-group[data-phase="FI"]    rect { fill: #64748b; }
    .bar-group[data-phase="EQ"]    rect { fill: #06b6d4; }
    .bar-group[data-phase="TQ"]    rect { fill: var(--accent); }
    .bar-group[data-phase="FQ"]    rect { fill: var(--quality); }
    .bar-group[data-phase="TAPER"] rect { fill: var(--race); }
    .bar-label, .bar-value {
      text-anchor: middle;
      font-family: var(--font-mono);
    }
    .bar-label { fill: var(--fg-dim); font-size: 9px; }
    .bar-value { fill: var(--fg-muted); font-size: 9px; font-weight: 500; }

    /* Week cards */
    .weeks-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .week-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-left: 3px solid var(--fg-dim);
      border-radius: var(--radius);
      padding: 1rem 1.15rem;
      animation: fadeUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      animation-delay: calc(var(--i) * 35ms);
      opacity: 0;
    }
    .week-card.phase-FI    { border-left-color: #64748b; }
    .week-card.phase-EQ    { border-left-color: #06b6d4; }
    .week-card.phase-TQ    { border-left-color: var(--accent); }
    .week-card.phase-FQ    { border-left-color: var(--quality); }
    .week-card.phase-TAPER { border-left-color: var(--race); }

    .week-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 0.75rem;
      padding-bottom: 0.65rem;
      margin-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .week-title {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0.5rem 0.75rem;
      min-width: 0;
    }
    .week-num {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .week-phase {
      font-size: 0.78rem;
      color: var(--fg-muted);
      font-weight: 500;
    }
    .week-km {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent);
      flex-shrink: 0;
      font-feature-settings: "tnum";
    }

    .day-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .day-row {
      display: grid;
      grid-template-columns: 5.5rem 2.75rem 1fr;
      gap: 0.6rem;
      padding: 0.32rem 0;
      align-items: baseline;
      font-size: 0.875rem;
    }
    .day-row + .day-row { border-top: 1px solid rgba(39, 39, 42, 0.5); }
    .day-label {
      display: flex;
      align-items: baseline;
      gap: 0.4rem;
      color: var(--fg-muted);
      font-feature-settings: "tnum";
    }
    .day-name {
      font-weight: 600;
      color: var(--fg);
      letter-spacing: -0.01em;
      width: 1.85rem;
    }
    .day-date {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--fg-dim);
    }
    .day-tag { display: flex; }
    .day-badge {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.15rem 0.45rem;
      border-radius: 3px;
      width: max-content;
      line-height: 1.4;
    }
    .badge-quality { background: var(--quality-soft); color: var(--quality); }
    .badge-long    { background: var(--long-soft);    color: var(--long); }
    .badge-race    { background: var(--race-soft);    color: var(--race); }
    .day-value {
      font-family: var(--font-mono);
      font-size: 0.83rem;
      color: var(--fg);
      letter-spacing: -0.005em;
      word-break: break-word;
    }
    .day-row.day-easy  .day-value { color: var(--fg-muted); }
    .day-row.day-q1    .day-value,
    .day-row.day-q2    .day-value { color: var(--fg); }
    .day-row.day-long  .day-value { color: var(--fg); }
    .day-row.day-race  .day-value {
      color: var(--race);
      font-weight: 600;
      font-family: var(--font);
    }
    .day-value.is-rest { color: var(--rest); font-style: italic; }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      .week-card { animation: none; opacity: 1; }
      * { transition-duration: 0.001ms !important; }
    }

    /* Footer */
    .page-footer {
      text-align: center;
      padding: 1rem 1rem 2rem;
      font-size: 0.82rem;
      color: var(--fg-dim);
      margin-top: auto;
    }
    .page-footer a { color: var(--fg-muted); text-decoration: none; }
    .page-footer a:hover { color: var(--fg); }

    /* Mobile */
    @media (max-width: 720px) {
      .vdot-hero {
        grid-template-columns: 1fr;
        gap: 1.25rem;
      }
      .vdot-block {
        padding-right: 0;
        padding-bottom: 1.25rem;
        border-right: none;
        border-bottom: 1px solid var(--border);
        min-width: 0;
      }
      .vdot-value { font-size: 3.25rem; }
      .form-row { grid-template-columns: 1fr; }
      .distance-options { grid-template-columns: repeat(2, 1fr); }
      .phase-strip { grid-template-columns: repeat(2, 1fr); }
      .day-row {
        grid-template-columns: 4.5rem 2.75rem 1fr;
        gap: 0.45rem;
      }
      .week-header { flex-wrap: wrap; }
    }
    @media (max-width: 460px) {
      .day-row {
        grid-template-columns: 1fr auto;
        row-gap: 0.15rem;
      }
      .day-label { grid-column: 1; grid-row: 1; }
      .day-tag   { grid-column: 2; grid-row: 1; justify-self: end; }
      .day-value { grid-column: 1 / -1; grid-row: 2; padding-left: 0.1rem; }
    }
  </style>
</head>
<body>
  <header class="page-header">
    <a href="/" class="brand">
      <svg class="brand-mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 12 L8 12 L11 4 L13 20 L16 12 L21 12"/>
      </svg>
      <span>vtrain</span>
    </a>
    <div class="lang-toggle" role="group" aria-label="Language">
      <button type="button" data-lang="en">EN</button>
      <button type="button" data-lang="es">ES</button>
    </div>
  </header>

  <div class="container">
    <section class="intro">
      <h1 class="hero-title" data-i18n="heroTitle"></h1>
      <p class="hero-subtitle" data-i18n="subtitle"></p>
    </section>

    <form class="calculator" id="plan-form" novalidate>
      <div class="field-group">
        <span class="field-label" data-i18n="labelDistance"></span>
        <div class="distance-options" role="radiogroup">
          <label class="distance-card">
            <input type="radio" name="distancia" value="42">
            <span class="dist-num">42</span>
            <span class="dist-label" data-distance-label="42"></span>
          </label>
          <label class="distance-card">
            <input type="radio" name="distancia" value="21" checked>
            <span class="dist-num">21</span>
            <span class="dist-label" data-distance-label="21"></span>
          </label>
          <label class="distance-card">
            <input type="radio" name="distancia" value="10">
            <span class="dist-num">10</span>
            <span class="dist-label" data-distance-label="10"></span>
          </label>
          <label class="distance-card">
            <input type="radio" name="distancia" value="0">
            <span class="dist-num">—</span>
            <span class="dist-label" data-distance-label="0"></span>
          </label>
        </div>
      </div>

      <div class="form-row">
        <label class="field field-group">
          <span class="field-label" data-i18n="labelRaceDate"></span>
          <input type="date" id="fechaCarrera" required>
        </label>
        <label class="field field-group">
          <span class="field-label" data-i18n="labelTargetTime"></span>
          <input type="time" id="tiempoObjetivo" step="1" value="01:35:00" required>
        </label>
      </div>

      <button type="submit" class="primary-cta" data-i18n="submit"></button>
    </form>

    <section id="output" class="plan-output" aria-live="polite"></section>
  </div>

  <footer class="page-footer">
    <a href="https://github.com/jandroav/vtrain" target="_blank" rel="noopener">github.com/jandroav/vtrain</a>
  </footer>

  <script src="vtrain.js"></script>
</body>
</html>
